<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1123 1400" width="1123" height="1400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&amp;family=Playfair+Display:ital,wght@0,700;0,900;1,700&amp;display=swap');
      .title-zh{font-family:'Noto Serif TC','Source Han Serif TC','PingFang TC',serif;font-weight:900;fill:#1F3A2E;letter-spacing:8px;}
      .sub-zh{font-family:'Noto Serif TC',serif;font-weight:500;fill:#2F5040;letter-spacing:6px;}
      .tag-en{font-family:'Playfair Display',serif;font-weight:700;font-style:italic;fill:#5A1410;letter-spacing:10px;text-anchor:middle;}
      .cta-zh{font-family:'Noto Serif TC',serif;font-weight:700;fill:#F4EBD9;letter-spacing:6px;text-anchor:middle;}
    </style>
    <radialGradient id="bgCream" cx="50%" cy="40%" r="78%">
      <stop offset="0%" stop-color="#F8F1E1"/>
      <stop offset="60%" stop-color="#F4EBD9"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1123" height="1400" fill="url(#bgCream)"/>

  <!-- 雙層邊框 -->
  <path d="M 60,160
           Q 60,60 160,60
           L 963,60
           Q 1063,60 1063,160
           L 1063,1320
           Q 1063,1340 1043,1340
           L 80,1340
           Q 60,1340 60,1320 Z"
        fill="none" stroke="#1F3A2E" stroke-width="2.5"/>
  <path d="M 78,170
           Q 78,78 170,78
           L 953,78
           Q 1045,78 1045,170
           L 1045,1314
           Q 1045,1322 1037,1322
           L 86,1322
           Q 78,1322 78,1314 Z"
        fill="none" stroke="#C9A96E" stroke-width="1"/>

  <!-- 頂部 tagline -->
  <text x="561.5" y="158" class="tag-en" font-size="20">FORTUNE · DESTINY READING</text>

  <!-- 主標金線 + 圓點 -->
  <g stroke="#C9A96E" stroke-width="1.2" fill="#C9A96E">
    <line x1="180" y1="222" x2="430" y2="222"/>
    <circle cx="438" cy="222" r="3.5"/>
    <line x1="685" y1="222" x2="935" y2="222"/>
    <circle cx="677" cy="222" r="3.5"/>
  </g>

  <!-- 主標題 -->
  <text x="561.5" y="295" class="title-zh" font-size="74" text-anchor="middle">你有富貴命的特徵嗎？</text>

  <!-- 金色菱形分隔 -->
  <g transform="translate(561.5,340)" fill="#C9A96E" stroke="#C9A96E">
    <line x1="-160" y1="0" x2="-22" y2="0" stroke-width="1"/>
    <polygon points="-14,0 0,-9 14,0 0,9"/>
    <line x1="22" y1="0" x2="160" y2="0" stroke-width="1"/>
  </g>

  <!-- 副標題 -->
  <text x="561.5" y="395" class="sub-zh" font-size="28" text-anchor="middle">選一株最吸引你的招財植物，看見你的隱藏財氣</text>

  <!-- ========== 植物拼貼圖 (使用者上傳) ========== -->
  <!-- 圖片區塊：x=181.5 y=460 w=760 h=760，等比置中 -->
  <image href="plants_grid.png" xlink:href="plants_grid.png"
         x="181.5" y="460" width="760" height="760"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- 圖片四角金色裝飾 -->
  <g stroke="#C9A96E" stroke-width="1.4" fill="none">
    <path d="M 175,460 L 175,485 M 175,460 L 200,460"/>
    <path d="M 948,460 L 948,485 M 948,460 L 923,460"/>
    <path d="M 175,1220 L 175,1195 M 175,1220 L 200,1220"/>
    <path d="M 948,1220 L 948,1195 M 948,1220 L 923,1220"/>
  </g>

  <!-- ========== 底部 CTA ========== -->
  <g transform="translate(561.5,1245)">
    <rect x="-330" y="-42" width="660" height="84" rx="42" ry="42" fill="#1F3A2E" stroke="#C9A96E" stroke-width="1.8"/>
    <rect x="-320" y="-32" width="640" height="64" rx="32" ry="32" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-dasharray="2,3"/>
    <text class="cta-zh" y="14" font-size="32">你選哪張？留言告訴我 A／B／C／D</text>
  </g>

  <!-- 底部金線 + 中央菱形 -->
  <g transform="translate(561.5,1310)" stroke="#C9A96E" fill="#C9A96E">
    <line x1="-220" y1="0" x2="-14" y2="0" stroke-width="1"/>
    <polygon points="-8,0 0,-7 8,0 0,7"/>
    <line x1="14" y1="0" x2="220" y2="0" stroke-width="1"/>
  </g>
</svg>
