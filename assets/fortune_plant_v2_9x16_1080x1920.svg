<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&amp;family=Playfair+Display:ital,wght@0,700;0,900;1,700&amp;display=swap');
      .title-zh{font-family:'Noto Serif TC','Source Han Serif TC','PingFang TC',serif;font-weight:900;fill:#1F3A2E;letter-spacing:8px;}
      .sub-zh{font-family:'Noto Serif TC',serif;font-weight:500;fill:#2F5040;letter-spacing:6px;}
      .tag-en{font-family:'Playfair Display',serif;font-weight:700;font-style:italic;fill:#5A1410;letter-spacing:10px;text-anchor:middle;}
      .tag-en-bot{font-family:'Playfair Display',serif;font-weight:700;font-style:italic;fill:#5A1410;letter-spacing:9px;text-anchor:middle;}
      .cta-zh{font-family:'Noto Serif TC',serif;font-weight:700;fill:#F4EBD9;letter-spacing:6px;text-anchor:middle;}
    </style>
    <radialGradient id="bgCream" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#F8F1E1"/>
      <stop offset="60%" stop-color="#F4EBD9"/>
      <stop offset="100%" stop-color="#E8DCC4"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgCream)"/>

  <!-- 雙層邊框 -->
  <path d="M 60,180
           Q 60,80 160,80
           L 920,80
           Q 1020,80 1020,180
           L 1020,1840
           Q 1020,1860 1000,1860
           L 80,1860
           Q 60,1860 60,1840 Z"
        fill="none" stroke="#1F3A2E" stroke-width="2.5"/>
  <path d="M 78,190
           Q 78,98 170,98
           L 910,98
           Q 1002,98 1002,190
           L 1002,1834
           Q 1002,1842 994,1842
           L 86,1842
           Q 78,1842 78,1834 Z"
        fill="none" stroke="#C9A96E" stroke-width="1"/>

  <!-- 頂部 tagline -->
  <text x="540" y="190" class="tag-en" font-size="22">FORTUNE · DESTINY READING</text>

  <!-- 主標金線 + 圓點 -->
  <g stroke="#C9A96E" stroke-width="1.2" fill="#C9A96E">
    <line x1="170" y1="265" x2="400" y2="265"/>
    <circle cx="408" cy="265" r="3.5"/>
    <line x1="680" y1="265" x2="910" y2="265"/>
    <circle cx="672" cy="265" r="3.5"/>
  </g>

  <!-- 主標題 -->
  <text x="540" y="345" class="title-zh" font-size="76" text-anchor="middle">你有富貴命的特徵嗎？</text>

  <!-- 金色菱形分隔 -->
  <g transform="translate(540,395)" fill="#C9A96E" stroke="#C9A96E">
    <line x1="-160" y1="0" x2="-22" y2="0" stroke-width="1"/>
    <polygon points="-14,0 0,-9 14,0 0,9"/>
    <line x1="22" y1="0" x2="160" y2="0" stroke-width="1"/>
  </g>

  <!-- 副標題 -->
  <text x="540" y="455" class="sub-zh" font-size="30" text-anchor="middle">選一株最吸引你的招財植物，看見你的隱藏財氣</text>

  <!-- ========== 植物拼貼圖 (使用者上傳) ========== -->
  <!-- 圖片區塊：x=105 y=560 w=870 h=870 -->
  <image href="plants_grid.png" xlink:href="plants_grid.png"
         x="105" y="560" width="870" height="870"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- 圖片四角金色裝飾 -->
  <g stroke="#C9A96E" stroke-width="1.4" fill="none">
    <path d="M 98,560 L 98,588 M 98,560 L 126,560"/>
    <path d="M 982,560 L 982,588 M 982,560 L 954,560"/>
    <path d="M 98,1430 L 98,1402 M 98,1430 L 126,1430"/>
    <path d="M 982,1430 L 982,1402 M 982,1430 L 954,1430"/>
  </g>

  <!-- ========== 底部 CTA ========== -->
  <g transform="translate(540,1620)">
    <rect x="-330" y="-46" width="660" height="92" rx="46" ry="46" fill="#1F3A2E" stroke="#C9A96E" stroke-width="1.8"/>
    <rect x="-320" y="-36" width="640" height="72" rx="36" ry="36" fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-dasharray="2,3"/>
    <text class="cta-zh" y="14" font-size="34">你選哪張？留言告訴我 A／B／C／D</text>
  </g>

  <!-- 底部金線 + 中央菱形 -->
  <g transform="translate(540,1710)" stroke="#C9A96E" fill="#C9A96E">
    <line x1="-220" y1="0" x2="-14" y2="0" stroke-width="1"/>
    <polygon points="-8,0 0,-7 8,0 0,7"/>
    <line x1="14" y1="0" x2="220" y2="0" stroke-width="1"/>
  </g>

  <!-- 底部小型 italic 英文 tagline -->
  <text x="540" y="1780" class="tag-en-bot" font-size="18">CHOOSE YOUR PLANT · UNLOCK YOUR FORTUNE</text>
</svg>
