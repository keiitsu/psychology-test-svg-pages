<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>心理測驗 SVG 圖檔</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: #263238;
      background: #f6f4ef;
    }

    body {
      margin: 0;
      padding: 32px;
    }

    main {
      max-width: 1120px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
    }

    p {
      margin: 0 0 28px;
      color: #59656b;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    article {
      background: #ffffff;
      border: 1px solid #ddd7cc;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(38, 50, 56, 0.08);
    }

    .preview {
      display: grid;
      place-items: center;
      min-height: 320px;
      padding: 16px;
      background: #ece7dc;
    }

    img {
      display: block;
      max-width: 100%;
      max-height: 460px;
      border-radius: 4px;
      background: #fff;
    }

    .content {
      padding: 16px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
    }

    a {
      color: #0f766e;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>心理測驗 SVG 圖檔</h1>
    <p>點選任一項目可開啟原始 SVG 圖檔。</p>

    <section class="grid" aria-label="SVG 圖檔列表">
      <article>
        <div class="preview">
          <img src="assets/crystal_aura_9x16_1080x1920.svg" alt="Crystal Aura 9x16">
        </div>
        <div class="content">
          <h2>Crystal Aura 9:16</h2>
          <a href="assets/crystal_aura_9x16_1080x1920.svg">開啟 SVG</a>
        </div>
      </article>

      <article>
        <div class="preview">
          <img src="assets/crystal_aura_4x5_1123x1400.svg" alt="Crystal Aura 4x5">
        </div>
        <div class="content">
          <h2>Crystal Aura 4:5</h2>
          <a href="assets/crystal_aura_4x5_1123x1400.svg">開啟 SVG</a>
        </div>
      </article>

      <article>
        <div class="preview">
          <img src="assets/fortune_plant_v2_9x16_1080x1920.svg" alt="Fortune Plant 9x16">
        </div>
        <div class="content">
          <h2>Fortune Plant 9:16</h2>
          <a href="assets/fortune_plant_v2_9x16_1080x1920.svg">開啟 SVG</a>
        </div>
      </article>

      <article>
        <div class="preview">
          <img src="assets/fortune_plant_v2_4x5_1123x1400.svg" alt="Fortune Plant 4x5">
        </div>
        <div class="content">
          <h2>Fortune Plant 4:5</h2>
          <a href="assets/fortune_plant_v2_4x5_1123x1400.svg">開啟 SVG</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
